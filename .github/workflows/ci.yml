name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  # Tag-Push triggert keinen eigenen Workflow mehr – die Tag-Erzeugung und der
  # darauf folgende Release-/Windows-Build laufen alle innerhalb des main-Push-
  # Workflows (auto-release → release → windows-app). Damit umgehen wir die
  # GitHub-Anti-Loop-Sperre, die Workflow-Pushes (auch mit PAT) nicht
  # zuverlässig in einen neuen Tag-Workflow überführt.

jobs:
  test:
    name: Test & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 20.x, 22.x ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build standalone bundle
        run: npm run build

  # Auto-Release auf main:
  # Analysiert Commits seit dem letzten Tag und entscheidet anhand Conventional
  # Commits (feat → minor, fix/perf/refactor → patch, reine chore/docs/test/ci/
  # style → kein Release), ob eine neue Version erzeugt werden muss. Bumpt
  # daraufhin die Version in fünf Dateien, committet als „chore(release): vX.Y.Z"
  # und pusht Tag. Die Folge-Jobs release/windows-app hängen via needs an dieser
  # Stelle.
  auto-release:
    name: Auto Release on main
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      bump: ${{ steps.bump.outputs.bump }}
      new_tag: ${{ steps.commit.outputs.new_tag }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # RELEASE_TOKEN (Fine-grained PAT mit Contents Write) ermöglicht den
          # commit + Tag-Push als echter Nutzer (CallMeTechie) statt als
          # github-actions[bot]. Fallback auf GITHUB_TOKEN, falls Secret fehlt.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Configure git
        run: |
          git config user.name "CallMeTechie"
          git config user.email "ma.backes@outlook.com"

      - name: Determine bump type
        id: bump
        shell: bash
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$last_tag" ]; then range="${last_tag}..HEAD"; else range="HEAD"; fi
          messages=$(git log --format="%s" "$range")
          echo "Commits seit ${last_tag:-Repo-Start}:"
          echo "$messages" | sed 's/^/  /'

          # Robuste Zählung ohne pipefail-Probleme: leerer grep-Output liefert
          # exit 1, was unter "set -e -o pipefail" sonst die ganze Pipeline killt.
          non_skippable=0
          has_feat=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if echo "$line" | grep -qE "^(chore|docs|test|ci|style)(\(.+\))?:"; then
              continue   # Wartungs-Commit ignorieren
            fi
            non_skippable=$((non_skippable + 1))
            if echo "$line" | grep -qiE "^(feat|feature)(\(.+\))?:|BREAKING CHANGE"; then
              has_feat=1
            fi
          done <<< "$messages"

          if [ "$non_skippable" -eq 0 ]; then
            echo "bump=skip" >> "$GITHUB_OUTPUT"
            echo "→ kein Release: nur Wartungs-Commits."
            exit 0
          fi
          if [ "$has_feat" -eq 1 ]; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "→ minor (feat/breaking)"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "→ patch (fix/refactor/perf/default)"
          fi

      - name: Bump version, commit & tag
        id: commit
        if: steps.bump.outputs.bump != 'skip'
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        shell: bash
        run: |
          set -euo pipefail
          current=$(node -p "require('./package.json').version")
          IFS=. read -r major minor patch <<< "$current"
          case "$BUMP" in
            patch) patch=$((patch+1)) ;;
            minor) minor=$((minor+1)); patch=0 ;;
            major) major=$((major+1)); minor=0; patch=0 ;;
          esac
          new="$major.$minor.$patch"
          echo "Bump $current → $new ($BUMP)"

          # 5 Stellen synchron erhöhen (sed mit fixiertem Suchstring).
          sed -i "s/\"version\": \"$current\"/\"version\": \"$new\"/" package.json
          sed -i "s/\"version\": \"$current\"/\"version\": \"$new\"/g" package-lock.json
          sed -i "s/^version = \"$current\"$/version = \"$new\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \"$current\"/\"version\": \"$new\"/" src-tauri/tauri.conf.json
          sed -i "s|<code>$current</code>|<code>$new</code>|" index.html

          git add -A
          git commit -m "chore(release): v$new"
          git tag -a "v$new" -m "Release $new"
          git push origin main
          git push origin "v$new"

          echo "new_tag=v$new" >> "$GITHUB_OUTPUT"

  # Linux-Release-Job: baut das Standalone-HTML und erstellt das GitHub-Release
  # mit Auto-Changelog. Läuft als Folge-Job von auto-release (nicht mehr auf
  # Tag-Push). Checkt explizit den neuen Tag aus, damit die Versionen
  # konsistent sind.
  release:
    name: Release
    needs: [ test, auto-release ]
    if: needs.auto-release.outputs.bump != 'skip' && needs.auto-release.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (Release-Tag)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto-release.outputs.new_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone bundle
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ needs.auto-release.outputs.new_tag }}
          tag_name: ${{ needs.auto-release.outputs.new_tag }}
          generate_release_notes: true
          files: autounattend-generator.standalone.html

  # Windows-App-Build: baut die Tauri-.exe (NSIS) und .msi auf einem
  # windows-latest-Runner und hängt beides ans Release.
  windows-app:
    name: Windows App (Tauri)
    needs: [ test, auto-release, release ]
    if: needs.auto-release.outputs.bump != 'skip' && needs.auto-release.outputs.new_tag != ''
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (Release-Tag)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto-release.outputs.new_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundles (.exe + .msi)
        run: npm run tauri -- build

      - name: Upload installers to the release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.auto-release.outputs.new_tag }}
        run: |
          gh release upload "$TAG_NAME" \
            "src-tauri/target/release/bundle/nsis/"*-setup.exe \
            "src-tauri/target/release/bundle/msi/"*.msi \
            --clobber
